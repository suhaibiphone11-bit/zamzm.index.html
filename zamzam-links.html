<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسماك زمزم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-deep: #0a1fdf;
    --blue-mid: #1a3af5;
    --blue-bright: #2d5eff;
    --blue-light: #4d7fff;
    --cyan: #00cfff;
    --white: #ffffff;
    --wave1: #1535e8;
    --wave2: #0d28c0;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--blue-deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(45,94,255,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,207,255,0.15) 0%, transparent 50%),
      linear-gradient(160deg, #0a1fdf 0%, #0d20b8 50%, #091aa0 100%);
    z-index: 0;
  }

  /* Floating bubbles */
  .bubbles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    animation: floatUp linear infinite;
  }
  .bubble:nth-child(1)  { width:18px; height:18px; left:10%; animation-duration:12s; animation-delay:0s; }
  .bubble:nth-child(2)  { width:10px; height:10px; left:25%; animation-duration:9s;  animation-delay:2s; }
  .bubble:nth-child(3)  { width:24px; height:24px; left:40%; animation-duration:14s; animation-delay:4s; }
  .bubble:nth-child(4)  { width:8px;  height:8px;  left:55%; animation-duration:10s; animation-delay:1s; }
  .bubble:nth-child(5)  { width:16px; height:16px; left:70%; animation-duration:13s; animation-delay:3s; }
  .bubble:nth-child(6)  { width:12px; height:12px; left:85%; animation-duration:11s; animation-delay:5s; }
  .bubble:nth-child(7)  { width:20px; height:20px; left:5%;  animation-duration:15s; animation-delay:6s; }
  .bubble:nth-child(8)  { width:6px;  height:6px;  left:60%; animation-duration:8s;  animation-delay:0.5s; }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) scale(0.8); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
  }

  /* Wave at bottom */
  .wave-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 220px;
    z-index: 1;
    overflow: hidden;
  }
  .wave {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 160px;
    border-radius: 50% 50% 0 0 / 80px 80px 0 0;
    opacity: 0.25;
    animation: waveAnim linear infinite;
  }
  .wave1 { background: var(--wave1); animation-duration: 8s; }
  .wave2 { background: var(--cyan); animation-duration: 11s; animation-delay: -3s; top: 20px; opacity: 0.12; }
  @keyframes waveAnim {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    width: min(420px, 92vw);
    padding: 48px 32px 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeIn 0.8s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo area */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--blue-bright), var(--cyan));
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    box-shadow: 0 8px 32px rgba(0,207,255,0.35), 0 0 0 1px rgba(255,255,255,0.12);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 8px 32px rgba(0,207,255,0.35), 0 0 0 1px rgba(255,255,255,0.12); }
    50%      { box-shadow: 0 8px 48px rgba(0,207,255,0.55), 0 0 0 2px rgba(0,207,255,0.25); }
  }
  .logo-title {
    font-size: 36px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: -0.5px;
    text-shadow: 0 2px 16px rgba(0,207,255,0.3);
  }
  .logo-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15) 30%, rgba(0,207,255,0.3) 50%, rgba(255,255,255,0.15) 70%, transparent);
    margin-bottom: 32px;
  }

  /* Links */
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 22px;
    border-radius: 16px;
    text-decoration: none;
    color: var(--white);
    font-size: 16px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.6s ease both;
  }
  .link-btn:nth-child(1) { animation-delay: 0.15s; }
  .link-btn:nth-child(2) { animation-delay: 0.28s; }
  .link-btn:nth-child(3) { animation-delay: 0.41s; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.18s ease;
  }

  /* Facebook */
  .link-btn.fb::before  { background: linear-gradient(90deg, rgba(24,119,242,0.25), transparent); }
  .link-btn.fb:hover    { background: rgba(24,119,242,0.18); border-color: rgba(24,119,242,0.5); box-shadow: 0 4px 24px rgba(24,119,242,0.25); transform: translateX(-4px); }

  /* Instagram */
  .link-btn.ig::before  { background: linear-gradient(90deg, rgba(225,48,108,0.2), transparent); }
  .link-btn.ig:hover    { background: rgba(225,48,108,0.14); border-color: rgba(225,48,108,0.45); box-shadow: 0 4px 24px rgba(225,48,108,0.2); transform: translateX(-4px); }

  /* TikTok */
  .link-btn.tt::before  { background: linear-gradient(90deg, rgba(0,0,0,0.3), transparent); }
  .link-btn.tt:hover    { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); box-shadow: 0 4px 24px rgba(255,255,255,0.1); transform: translateX(-4px); }

  .link-btn:hover::before { opacity: 1; }
  .link-btn:active { transform: scale(0.97) !important; }

  .link-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
  }
  .fb .link-icon  { background: #1877F2; }
  .ig .link-icon  { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .tt .link-icon  { background: #000; border: 1px solid rgba(255,255,255,0.15); }

  .link-label {
    flex: 1;
    text-align: right;
  }
  .link-label span {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }

  .arrow {
    font-size: 18px;
    opacity: 0.4;
    transition: opacity 0.18s, transform 0.18s;
    transform: rotate(180deg);
  }
  .link-btn:hover .arrow { opacity: 1; transform: rotate(180deg) translateX(4px); }

  /* Footer */
  .footer {
    margin-top: 36px;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
